<p><a href="https://arxiv.org/pdf/2505.00703" target="_blank" rel="noopener noreferrer">https://arxiv.org/pdf/2505.00703</a></p>

<ul>
<li>图像生成不仅需要理解文本（prompt）含义，还要实现跨模态的、逐像素的细节合成</div></div></div></template><template><div class="vp-blog-post-item has-cover right" data-allow-mismatch data-v-318ba534 data-v-cde94b23><div data-allow-mismatch class="post-cover" style="width:240px;height:180px;" data-v-cde94b23><img src="https://raw.githubusercontent.com/PLUS-WAVE/blog-image/master/img/blog/2025-05-05/image-20250505110137747.png" alt="Can We Generate Images with CoT? 学习笔记" loading="lazy" data-v-cde94b23></div><div class="blog-post-item-content" data-v-cde94b23><h3 data-v-cde94b23><!----><!----><a class="vp-link link" href="/docs/article/n98yl04i/" data-v-cde94b23><!--[-->Can We Generate Images with CoT? 学习笔记<!--]--><!----></a></h3><div class="post-meta" data-v-cde94b23><div class="category-list" data-v-cde94b23><span class="icon vpi-folder" data-v-cde94b23></span><!--[--><!--[--><a class="vp-link link" href="/docs/blog/categories/?id=de90e8" data-v-cde94b23><!--[--> CV<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-cde94b23><span class="icon vpi-tag" data-v-cde94b23></span><!--[--><a class="vp-link link tag vp-tag-2j9a" href="/docs/blog/tags/?tag=CV" data-v-cde94b23><!--[-->CV<!--]--><!----></a><a class="vp-link link tag vp-tag-rt4i" href="/docs/blog/tags/?tag=Generation" data-v-cde94b23><!--[-->Generation<!--]--><!----></a><a class="vp-link link tag vp-tag-mw2n" href="/docs/blog/tags/?tag=Reasoning" data-v-cde94b23><!--[-->Reasoning<!--]--><!----></a><!--]--></div><div class="create-time" data-v-cde94b23><span class="icon vpi-clock" data-v-cde94b23></span><span data-v-cde94b23>2025-05-05</span></div></div><div class="vp-doc excerpt" data-v-cde94b23>
<p><a href="https://arxiv.org/abs/2501.13926" target="_blank" rel="noopener noreferrer">https://arxiv.org/abs/2501.13926</a></p>
<p><strong>将 CoT 推理策略从语言任务迁移到自回归图像生成中</strong></p>
<p>自回归图像生成与语言生成在“逐token生成”的机制上高度相似，为应用CoT提供了潜在可行性</p>
<blockquote>

<p><a href="https://arxiv.org/abs/2402.04236" target="_blank" rel="noopener noreferrer">https://arxiv.org/abs/2402.04236</a></p>
<p>当前 VLMs 通过对齐视觉输入和语言输出训练，虽然整体表现好，但在需要<strong>细致视觉推理</strong>的任务上容易出错，比如无法正确识别图片中的细节内容。这是因为现有模型习惯直接给出结论，而缺乏中间推理步骤。</div></div></div></template><template><div class="vp-blog-post-item" data-allow-mismatch data-v-318ba534 data-v-cde94b23><!----><div class="blog-post-item-content" data-v-cde94b23><h3 data-v-cde94b23><!----><!----><a class="vp-link link" href="/docs/article/3xzy3tb5/" data-v-cde94b23><!--[-->movie<!--]--><!----></a></h3><div class="post-meta" data-v-cde94b23><div class="category-list" data-v-cde94b23><span class="icon vpi-folder" data-v-cde94b23></span><!--[--><!--[--><a class="vp-link link" href="/docs/blog/categories/?id=5ebeb6" data-v-cde94b23><!--[-->preview<!--]--><!----></a><!----><!--]--><!--]--></div><!----><div class="create-time" data-v-cde94b23><span class="icon vpi-clock" data-v-cde94b23></span><span data-v-cde94b23>2025-02-06</span></div></div><!----></div></div></template><template><div class="vp-blog-post-item has-cover right" data-allow-mismatch data-v-318ba534 data-v-cde94b23><div data-allow-mismatch class="post-cover" style="width:240px;height:180px;" data-v-cde94b23><img src="https://raw.githubusercontent.com/PLUS-WAVE/blog-image/master/img/blog/2025-01-27/image-20250125150751550.png" alt="GVHMR 学习笔记" loading="lazy" data-v-cde94b23></div><div class="blog-post-item-content" data-v-cde94b23><h3 data-v-cde94b23><!----><!----><a class="vp-link link" href="/docs/article/aywxdzgr/" data-v-cde94b23><!--[-->GVHMR 学习笔记<!--]--><!----></a></h3><div class="post-meta" data-v-cde94b23><div class="category-list" data-v-cde94b23><span class="icon vpi-folder" data-v-cde94b23></span><!--[--><!--[--><a class="vp-link link" href="/docs/blog/categories/?id=de90e8" data-v-cde94b23><!--[--> CV<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-cde94b23><span class="icon vpi-tag" data-v-cde94b23></span><!--[--><a class="vp-link link tag vp-tag-kd6q" href="/docs/blog/tags/?tag=3DVision" data-v-cde94b23><!--[-->3DVision<!--]--><!----> de94b23><span class="icon vpi-folder" data-v-cde94b23></span><!--[--><!--[--><a class="vp-link link" href="/docs/blog/categories/?id=64602e" data-v-cde94b23><!--[--> Talks<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-cde94b23><span class="icon vpi-tag" data-v-cde94b23></span><!--[--><a class="vp-link link tag vp-tag-r70h" href="/docs/blog/tags/?tag=Talks" data-v-cde94b23><!--[-->Talks<!--]--><!----></a><!--]--></div><div class="create-time" data-v-cde94b23><span class="icon vpi-clock" data-v-cde94b23></span><span data-v-cde94b23>2025-01-18</span></div></div><div class="vp-doc excerpt" data-v-cde94b23><p>虽然说是 2024 的总结，但是我从写博客开始就没有一个总结，不如趁着这个机会，我就将我从写博客起源开始，将我这接近两年的博客生涯，回顾总结一下吧！</p>
</div></div></div></template><template><div class="vp-blog-post-item" data-allow-mismatch data-v-318ba534 data-v-cde94b23><!----><div class="blog-post-item-content" data-v-cde94b23><h3 data-v-cde94b23><!----><!----><a class="vp-link link" href="/docs/article/dwpeq4pf/" data-v-cde94b23><!--[-->Conda安装Pytorch和CUDA/GCC与一些环境Bug解决<!--]--><!----></a></h3><div class="post-meta" data-v-cde94b23><div class="category-list" data-v-cde94b23><span class="icon vpi-folder" data-v-cde94b23></span><!--[--><!--[--><a class="vp-link link" href="/docs/blog/categories/?id=873c88" data-v-cde94b23><!--[--> Tools &amp; Skills<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-cde94b23><span class="icon vpi-tag" data-v-cde94b23></span><!--[--><a class="vp-link link tag vp-tag-ftio" href="/docs/blog/tags/?tag=Skills" data-v-cde94b23><!--[-->Skills<!--]--><!----></a><a class="vp-link link tag vp-tag-r70h" href="/docs/blog/tags/?tag=Pytorch" data-v-cde94b23><!--[-->Pytorch<!--]--><!----></a><a class="vp-link link tag vp-tag-zels" href="/docs/blog/tags/?tag=Conda" data-v-cde94b23><!--[-->Conda<!--]--><!----></a><a class="vp-link link tag vp-tag-61w2" href="/docs/blog/tags/?tag=CUDA" data-v-cde94b23><!--[-->CUDA<!--]--><!----></a><!--]--></div><div class="create-time" data-v-cde94b23><span class="icon vpi-clock" data-v-cde94b23></span><span data-v-cde94b23>2024-12-01</span></div></div><div class="vp-doc excerpt" data-v-cde94b23><p>在实验室服务器上的时候，一般是没有 root 权限的，而服务器可能只安装了特定版本的 CUDA 和 GCC，我们就需要自己安装<strong>自己需要版本的 CUDA/GCC</strong> 来满足安装包时的环境要求。</p>
<p>而 Conda 除了安装 Python 的包以外，其<strong>还提供了很多其他库</strong>——比如CUDA、GCC甚至还有 COLMAP</div></div></div></template><template><div class="vp-blog-post-item has-cover right" data-allow-mismatch data-v-318ba534 data-v-cde94b23><div data-allow-mismatch class="post-cover" style="width:240px;height:180px;" data-v-cde94b23><img src="https://raw.githubusercontent.com/PLUS-WAVE/blog-image/master/img/blog/2024-11-22/image-20241120164256729.png" alt="GAGAvatar 学习笔记" loading="lazy" data-v-cde94b23></div><div class="blog-post-item-content" data-v-cde94b23><h3 data-v-cde94b23><!----><!----><a class="vp-link link" href="/docs/article/k40n4rsk/" data-v-cde94b23><!--[-->GAGAvatar 学习笔记<!--]--><!----></a></h3><div class="post-meta" data-v-cde94b23><div class="category-list" data-v-cde94b23><span class="icon vpi-folder" data-v-cde94b23></span><!--[--><!--[--><a class="vp-link link" href="/docs/blog/categories/?id=de90e8" data-v-cde94b23><!--[--> CV<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-cde94b23><span class="icon vpi-tag" data-v-cde94b23></span><!--[--><a class="vp-link link tag vp-tag-kd6q" href="/docs/blog/tags/?tag=3DVision" data-v-cde94b23><!--[-->3DVision<!--]--><!----></a><a class="vp-link link tag vp-tag-1jsa" href="/docs/blog/tags/?tag=3DGS" data-v-cde94b23><!--[-->3DGS<!--]--><!----></a><a class="vp-link link tag vp-tag-nvwn" href="/docs/blog/tags/?tag=Head Avatar" data-v-cde94b23><!--[-->Head Avatar<!--]--><!----></a><!--]--></div><div class="create-time" data-v-cde94b23><span class="icon vpi-clock" data-v-cde94b23></span><span data-v-cde94b23>2024-11-21</span></div></div><div class="vp-doc excerpt" data-v-cde94b23>
